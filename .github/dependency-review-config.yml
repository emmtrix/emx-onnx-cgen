# Dependency Review configuration for emx-onnx-cgen.
#
# The onnx-org/ and onnx2c-org/ directories are read-only reference submodules
# (upstream ONNX library source).  They pin protobuf==4.25.1 in their own
# minimum/release-build requirement files.  Those files are never installed by
# this project; the project's own constraint is protobuf>=5.29.6 (pyproject.toml
# and requirements-ci.txt).
#
# The two GHSAs below are therefore allowed exclusively because their only
# remaining occurrence in this repository is inside those reference submodules.
allow-ghsas:
  - GHSA-8qvm-5x2c-j2w7  # CVE-2025-4565 — protobuf DoS (< 4.25.8), submodule-only
  - GHSA-7gcm-g887-7qv7  # CVE-2026-0994 — JSON recursion bypass (< 5.29.6), submodule-only
