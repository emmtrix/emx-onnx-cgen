name: tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-24.04
    env:
      CC: gcc-14
      CXX: g++-14
      EMX_ENABLE_SANITIZE: "1"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install GCC 14
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-14 g++-14

      - name: Install dependencies
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive
          python -m pip install -r requirements-ci.txt

      - name: Auto-format with Ruff
        run: ruff format src tests

      - name: Run Ruff
        run: ruff check src tests

      - name: Run Vulture
        run: vulture

      - name: Run tests
        if: github.event_name == 'push'
        run: pytest -q

      - name: Generate markdown references (phase 1)
        if: github.event_name == 'pull_request'
        run: |
          UPDATE_REFS=1 pytest -q tests/test_official_onnx_files_docs.py::test_official_onnx_file_support_doc

      - name: Commit phase 1 updates
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          if git status --porcelain | grep -q .; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "tests: commit phase 1 updates"
            git push origin "HEAD:${GITHUB_HEAD_REF}"
          else
            echo "No phase 1 updates."
          fi

      - name: Run tests (update refs for PRs)
        if: github.event_name == 'pull_request'
        run: UPDATE_REFS=3 pytest -q

      - name: Capture reference updates
        if: github.event_name == 'pull_request'
        run: |
          mkdir -p ci-artifacts
          if git status --porcelain | grep -q .; then
            {
              echo "Reference update changed files:"
              git diff --name-status
            } | tee ci-artifacts/reference-changed-files.txt
            git diff --binary > ci-artifacts/reference-updates.diff
          else
            echo "No reference updates." | tee ci-artifacts/reference-changed-files.txt
            : > ci-artifacts/reference-updates.diff
          fi

      - name: Commit updated references
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          if git status --porcelain | grep -q .; then
            echo "Reference update files to commit:"
            git diff --name-status
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "tests: update golden references"
            git push origin "HEAD:refs/heads/${GITHUB_HEAD_REF}"
          else
            echo "No reference updates."
          fi

      - name: Capture final git state
        if: github.event_name == 'pull_request' && always()
        run: |
          mkdir -p ci-artifacts
          git status --short > ci-artifacts/final-git-status.txt
          if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            git show --stat --name-status --format=fuller HEAD > ci-artifacts/latest-commit.txt
            git diff --binary HEAD^ HEAD > ci-artifacts/latest-commit.diff
          else
            echo "No parent commit available for HEAD." > ci-artifacts/latest-commit.txt
            : > ci-artifacts/latest-commit.diff
          fi

      - name: Upload git change artifacts
        if: github.event_name == 'pull_request' && always()
        uses: actions/upload-artifact@v4
        with:
          name: git-change-artifacts-py${{ matrix.python-version }}
          path: ci-artifacts/
          if-no-files-found: warn
