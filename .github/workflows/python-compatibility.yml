name: python-compatibility

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  verify-local-model:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and verify dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[verify]"

      - name: Verify local ONNX model
        run: |
          python -m emx_onnx_cgen.cli verify tests/onnx/micro_kws_m_static_fp32.onnx
