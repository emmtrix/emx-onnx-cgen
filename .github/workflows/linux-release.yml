name: linux-release

on:
  workflow_dispatch:
    inputs:
      upload:
        description: "Upload release asset"
        required: false
        default: "false"
  release:
    types: [published]

jobs:
  build-linux-bundle:
    runs-on: ubuntu-latest
    container:
      # Build in manylinux_2_34 so the bundled libpython keeps a GLIBC_2.34 floor.
      image: quay.io/pypa/manylinux_2_34_x86_64
    permissions:
      contents: write
    env:
      PYBIN: /opt/python/cp311-cp311/bin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        run: |
          "${PYBIN}/python" --version
          "${PYBIN}/python" -m pip --version

      - name: Install dependencies
        run: |
          "${PYBIN}/python" -m pip install --upgrade pip
          "${PYBIN}/python" -m pip install -r requirements-ci.txt

      - name: Build PyInstaller bundle
        run: |
          "${PYBIN}/python" tools/pyinstaller_build.py

      - name: Validate bundled glibc floor
        run: |
          shopt -s nullglob
          libpython_candidates=(dist/emx-onnx-cgen/_internal/libpython*.so.*)
          if [ "${#libpython_candidates[@]}" -eq 0 ]; then
            echo "ERROR: no bundled libpython shared library found under dist/emx-onnx-cgen/_internal"
            exit 1
          fi
          libpython_path="${libpython_candidates[0]}"
          echo "Inspecting: ${libpython_path}"
          max_glibc="$(strings "${libpython_path}" | grep -oE 'GLIBC_[0-9]+\.[0-9]+' | sort -V | tail -n1)"
          if [ -z "${max_glibc}" ]; then
            echo "ERROR: unable to detect GLIBC symbols in ${libpython_path}"
            exit 1
          fi
          echo "Highest required glibc symbol: ${max_glibc}"
          if [ "$(printf '%s\n' "${max_glibc}" "GLIBC_2.34" | sort -V | tail -n1)" != "GLIBC_2.34" ]; then
            echo "ERROR: bundled libpython requires ${max_glibc}, expected <= GLIBC_2.34 from manylinux_2_34 build env"
            exit 1
          fi

      - name: Package bundle
        run: |
          tar -czf emx-onnx-cgen-linux-amd64.tar.gz -C dist/emx-onnx-cgen .

      - name: Upload workflow artifact
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v4
        with:
          name: emx-onnx-cgen-linux-amd64
          path: emx-onnx-cgen-linux-amd64.tar.gz

      - name: Upload release asset
        if: ${{ github.event_name == 'release' }}
        uses: softprops/action-gh-release@v2
        with:
          files: emx-onnx-cgen-linux-amd64.tar.gz
