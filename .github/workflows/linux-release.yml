name: linux-release

on:
  workflow_dispatch:
    inputs:
      upload:
        description: "Upload release asset"
        required: false
        default: "false"
  release:
    types: [published]

jobs:
  build-linux-bundle:
    runs-on: ubuntu-latest
    container:
      image: quay.io/pypa/manylinux_2_28_x86_64
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        run: |
          export PATH="/opt/python/cp310-cp310/bin:${PATH}"
          python --version
          python -m pip --version

      - name: Install system dependencies
        run: |
          if command -v dnf >/dev/null 2>&1; then
            dnf install -y gcc gcc-c++ make
          elif command -v yum >/dev/null 2>&1; then
            yum install -y gcc gcc-c++ make
          elif command -v apt-get >/dev/null 2>&1; then
            apt-get update
            apt-get install -y --no-install-recommends build-essential
            rm -rf /var/lib/apt/lists/*
          else
            echo "No supported package manager found (dnf/yum/apt-get)." >&2
            exit 1
          fi

      - name: Install dependencies
        run: |
          export PATH="/opt/python/cp310-cp310/bin:${PATH}"
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ci.txt
          python -m pip install pyinstaller

      - name: Build PyInstaller bundle
        run: |
          export PATH="/opt/python/cp310-cp310/bin:${PATH}"
          python tools/pyinstaller_build.py

      - name: Package bundle
        run: |
          tar -czf emx-onnx-cgen-linux-amd64.tar.gz -C dist/emx-onnx-cgen .

      - name: Upload workflow artifact
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v4
        with:
          name: emx-onnx-cgen-linux-amd64
          path: emx-onnx-cgen-linux-amd64.tar.gz

      - name: Upload release asset
        if: ${{ github.event_name == 'release' }}
        uses: softprops/action-gh-release@v2
        with:
          files: emx-onnx-cgen-linux-amd64.tar.gz
