name: linux-release

on:
  workflow_dispatch:
    inputs:
      upload:
        description: "Upload release asset"
        required: false
        default: "false"
  release:
    types: [published]

jobs:
  build-linux-bundle:
    runs-on: ubuntu-latest
    container:
      # Build in a deliberately older glibc environment so the bundled
      # libpython has a lower runtime glibc floor.
      image: python:3.11-slim-bullseye
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        run: |
          python --version
          python -m pip --version

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential \
          && rm -rf /var/lib/apt/lists/*

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ci.txt
          python -m pip install pyinstaller

      - name: Build PyInstaller bundle
        run: |
          python tools/pyinstaller_build.py

      - name: Validate bundled glibc floor
        run: |
          libpython_path="$(ls dist/emx-onnx-cgen/_internal/libpython*.so.*)"
          echo "Inspecting: ${libpython_path}"
          max_glibc="$(strings "${libpython_path}" | grep -oE 'GLIBC_[0-9]+\.[0-9]+' | sort -V | tail -n1)"
          echo "Highest required glibc symbol: ${max_glibc}"
          if [ "$(printf '%s\n' "${max_glibc}" "GLIBC_2.31" | sort -V | tail -n1)" != "GLIBC_2.31" ]; then
            echo "ERROR: bundled libpython requires ${max_glibc}, expected <= GLIBC_2.31 from bullseye build env"
            exit 1
          fi


      - name: Package bundle
        run: |
          tar -czf emx-onnx-cgen-linux-amd64.tar.gz -C dist/emx-onnx-cgen .

      - name: Upload workflow artifact
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v4
        with:
          name: emx-onnx-cgen-linux-amd64
          path: emx-onnx-cgen-linux-amd64.tar.gz

      - name: Upload release asset
        if: ${{ github.event_name == 'release' }}
        uses: softprops/action-gh-release@v2
        with:
          files: emx-onnx-cgen-linux-amd64.tar.gz
